<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#111827">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="assets/icon-192.png">
<title>CoachChess</title>
<style>
:root{--bg:#0f172a;--panel:#111827;--text:#f8fafc;--muted:#cbd5e1;--light:#f0d9b5;--dark:#b58863;--accent:#facc15}
*{box-sizing:border-box}body{margin:0;min-height:100vh;background:linear-gradient(145deg,#0f172a,#111827 55%,#172554);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
.app{max-width:1100px;margin:auto;padding:14px;display:grid;grid-template-columns:minmax(320px,690px) minmax(280px,1fr);gap:16px}
h1{margin:0;font-size:1.45rem}.sub{color:var(--muted);margin:5px 0 12px}.panel{background:#111827f2;border-radius:18px;padding:12px;box-shadow:0 14px 40px #0006}
.board{display:grid;grid-template-columns:repeat(8,minmax(0,1fr));grid-template-rows:repeat(8,minmax(0,1fr));aspect-ratio:1;border-radius:10px;overflow:hidden}
.sq{position:relative;border:0;padding:0;min-width:0;min-height:0;line-height:1;display:flex;align-items:center;justify-content:center;font-size:clamp(36px,7.2vw,70px);line-height:1;cursor:pointer;user-select:none}.l{background:var(--light)}.d{background:var(--dark)}
.sel{outline:5px solid var(--accent);outline-offset:-5px}.last{box-shadow:inset 0 0 0 999px #fde04755}.legal:after{content:"";position:absolute;width:23%;height:23%;border-radius:50%;background:#1118}.capture:after{content:"";position:absolute;inset:5%;border:6px solid #1118;border-radius:50%}
.sq{font-family:"Arial Unicode MS","Apple Symbols","Segoe UI Symbol",sans-serif}.w{color:#fff;text-shadow:-1.4px -1.4px 0 #111,1.4px -1.4px 0 #111,-1.4px 1.4px 0 #111,1.4px 1.4px 0 #111,0 2px 2px #0005}.b{color:#111;text-shadow:-1px -1px 0 #f8fafc66,1px -1px 0 #f8fafc66,-1px 1px 0 #f8fafc66,1px 1px 0 #f8fafc66,0 2px 2px #0005}
.coord{position:absolute;font-size:10px;font-weight:700;opacity:.7}.file{right:3px;bottom:2px}.rank{left:3px;top:2px}
.side{display:flex;flex-direction:column;gap:10px}.status{font-weight:800;font-size:1.05rem}.muted{color:var(--muted);font-size:.9rem}.buttons{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}.btn{border:0;border-radius:10px;padding:11px 8px;background:#334155;color:#fff;font-weight:700}.primary{background:#2563eb}
.moves{background:#0b1220;border-radius:10px;max-height:230px;overflow:auto;margin-top:8px;padding:7px}.row{display:grid;grid-template-columns:38px 1fr 1fr;padding:5px;border-bottom:1px solid #ffffff12}
select,textarea{width:100%;background:#0b1220;color:#fff;border:1px solid #475569;border-radius:9px;padding:9px;font:inherit}textarea{min-height:74px}label{display:block;color:var(--muted);font-size:.84rem;margin:8px 0 4px}
.install{display:none;width:100%;margin-top:8px;background:#16a34a}
@media(max-width:820px){.app{grid-template-columns:1fr;padding:9px}.moves{max-height:170px}}
</style>
</head>
<body>
<div class="app">
<main>
<h1>CoachChess <span style="font-size:.72rem;color:#94a3b8">v1.3</span></h1><div class="sub">Installierbarer Schachtrainer · Du spielst Weiß</div>
<div class="panel"><div id="board" class="board"></div></div>
</main>
<aside class="side">
<section class="panel"><div id="status" class="status">Weiß am Zug</div><div id="detail" class="muted">Neue Partie</div><div id="engineStatus" class="muted" style="margin-top:5px">Engine wird geladen …</div>
<div class="buttons"><button id="new" class="btn primary">Neue Partie</button><button id="undo" class="btn">Zug zurück</button><button id="flip" class="btn">Brett drehen</button><button id="hint" class="btn">Hinweis</button></div>
<button id="install" class="btn install">App installieren</button></section>
<section class="panel"><strong>Trainer</strong><div id="coach" class="muted" style="margin-top:7px">Besetze das Zentrum und entwickle Springer und Läufer.</div></section>
<section class="panel"><strong>Zugliste</strong><div id="moves" class="moves"></div></section>
<section class="panel"><strong>Einstellungen</strong><label>Computerstufe</label><select id="level"><option value="1">Leicht</option><option value="2" selected>Mittel</option><option value="3">Stärker</option></select><label>FEN</label><textarea id="fen" readonly></textarea></section>
</aside></div>
<script src="app.js"></script>
</body></html>
